name: Feature request
description: Request a new feature
title: "[Feature]: "
labels: [enhancement]
assignees: Peperehobbit01
  -
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this feature request!

  - type: textarea
    id: feature
    attributes:
      label: Feature?
      description: Please describe the feature you are requesting in detail
      placeholder: describe....
    validations:
      required: true

  - type: dropdown
    id: system
    attributes:
      label: System
      description: Please select the system that the requested feature pertains to.
      options:
        - "Giveaway System"
        - "Fun System"
        - "Modération System"
        - "Expérience System"
        - "Logs System"
        - "Other components of the software"
    validations:
      required: true

  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      description: By submitting this issue, you agree to follow our [Code of Conduct](https://github.com/Peperehobbit01/Peperehobbits01-s-bot/blob/main/.github/CODE_OF_CONDUCT.md)
      options:
        - label: I agree to follow this project's Code of Conduct
          required: true

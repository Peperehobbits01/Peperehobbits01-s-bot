name: 'Prepare Release'
description: 'Generates changelog and bumps version for release PRs'

inputs:
  MANUAL_BUMP:
    description: 'Manual version bump type (major/minor/patch)'
    required: false
    default: ''
  GITHUB_TOKEN:
    description: 'GitHub token for PR creation'
    required: false
    default: ''
  GITHUB_BASE_REF:
    description: 'Base branch for the PR'
    required: false
    default: 'main'

outputs:
  skip:
    description: 'Whether to skip release (true/false)'
  new_version:
    description: 'New version number'
  release_type:
    description: 'Type of release (major/minor/patch)'
  commit_message:
    description: 'Git commit message for the version bump'
  pr_url:
    description: 'URL of the created pull request'

runs:
  using: 'node20'
  main: 'index.js'

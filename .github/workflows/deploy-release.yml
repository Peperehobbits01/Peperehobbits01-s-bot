name: Deploy Release

on:
  pull_request:
    branches:
      - main
    types:
      - closed

permissions:
  contents: write

jobs:
  publish-release:
    if: |
      github.event.pull_request.merged == true &&
      startsWith(github.head_ref, 'prepare-release-') &&
      startsWith(github.event.pull_request.title, 'Prepare release')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.merge_commit_sha || github.sha }}

      - name: Extract version from PR title
        id: version
        run: |
          VERSION=$(echo "${{ github.event.pull_request.title }}" | sed -n 's/Prepare release \(v*[0-9]\.[0-9]\.[0-9]*\)/\1/Ip')
          if [ -z "$VERSION" ]; then
            VERSION=$(node -p "require('./package.json').version")
          fi
          # Remove v prefix if present
          VERSION_NO_V="${VERSION#v}"
          echo "tag=$VERSION" >> $GITHUB_OUTPUT
          echo "version=$VERSION_NO_V" >> $GITHUB_OUTPUT
          echo "Found version: $VERSION"

      - name: Get release body from PR
        id: body
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Download the PR body as raw text
          gh api "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}" \
            --jq '.body' > /tmp/release-body.txt
          
          # Write to GITHUB_OUTPUT
          echo "body<<EOF" >> $GITHUB_OUTPUT
          cat /tmp/release-body.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.tag }}"
          # Use the PR body as the release notes
          gh release create "$VERSION" \
            --title "Release $VERSION" \
            --target "${{ github.event.pull_request.merge_commit_sha || github.sha }}" \
            --notes "$(cat /tmp/release-body.txt)" \
            --latest

      - name: Cleanup release branch
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH_NAME="${{ github.head_ref }}"
          if git ls-remote origin "refs/heads/$BRANCH_NAME" | grep -q "$BRANCH_NAME"; then
            git push origin --delete "$BRANCH_NAME" || echo "Branch already deleted"
          fi

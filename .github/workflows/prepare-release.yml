name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: "Manual version bump type (optional - auto-detected if empty)"
        required: false
        default: ""
        type: choice
        options:
          - ""
          - major
          - minor
          - patch

permissions:
  contents: write
  pull-requests: write

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Install action dependencies
        run: npm install
        working-directory: ./.github/actions/prepare-release

      - name: Prepare release
        id: prepare
        uses: ./.github/actions/prepare-release
        env:
          MANUAL_BUMP: ${{ github.event.inputs.bump_type }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_BASE_REF: ${{ github.event.repository.default_branch }}

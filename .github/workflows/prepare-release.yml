name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  pull-requests: write

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: dev

      - name: Get current version
        id: current
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Current version: $VERSION"

      - name: Bump version
        id: bump
        run: |
          VERSION="${{ steps.current.outputs.version }}"
          MAJOR=${VERSION%%.*}
          REST=${VERSION#*.}
          MINOR=${REST%.*}
          PATCH=${REST##*.}

          BUMP="${{ github.event.inputs.bump_type }}"
          if [ "$BUMP" = "major" ]; then
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
          elif [ "$BUMP" = "minor" ]; then
            MINOR=$((MINOR + 1))
            PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "New version: $NEW_VERSION"

      - name: Update package.json
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '${{ steps.bump.outputs.version }}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Create git-cliff config
        run: |
          cat > git-cliff.toml << 'EOF'
          [changelog]
          header = "## What's Changed\n"
          body = """
          {% for group, commits in commits | group_by(attribute='group') %}
              ## {{ group | striptags | trim | upper }}
              
              {% for commit in commits %}
                  {% if commit.scope %}
                  - **{{ commit.scope }}**: {{ commit.message | trim }} ({{ commit.id | truncate(count=11) }})
                  {% else %}
                  - {{ commit.message | trim }} ({{ commit.id | truncate(count=11) }})
                  {% endif %}
              {% endfor %}
              {% endfor %}
          """
          trim = true
          footer = ""
          [git]
          conventional_commits = true
          filter_unconventional = true
          commit_parsers = [                                                                                                                                0% used                                 
                   { message = "^feat", group = "**Features**" },                                                                                                $0.00 spent                             
                   { message = "^fix|^hotfix", group = "**🐛 Bug Fixes**" },                                                                                                                             
                   { message = "^refactor", group = "**🏗 Refactors**" },                                                                                        LSP                                     
                   { message = "^chore", group = "**📋 Chore**" },                                                                                               LSPs are disabled                       
                   { message = "^docs", group = "**📚 Documentation**" },                                                                                                                                
                   { message = "^test", group = "**🧪 Tests**" },                                                                                                                                        
                   { message = "^perf", group = "**⚡  Performance**" },                                                                                                                                  
          ]   
          EOF

      - name: Generate changelog
        id: changelog
        run: |
          pip install git-cliff
          LAST_TAG=$(git describe --tags --abbrev=0 HEAD 2>/dev/null | head -1 || echo "")
          if [ -n "$LAST_TAG" ]; then
            git-cliff --latest "$LAST_TAG"...HEAD --config git-cliff.toml > /tmp/changelog.md
          else
            git-cliff --config git-cliff.toml > /tmp/changelog.md
          fi
          VERSION="${{ steps.bump.outputs.version }}"
          {
            echo "$VERSION"
            echo ""
            cat /tmp/changelog.md
          } > /tmp/changelog-with-version.md
          {
            echo "body<<EOF"
            cat /tmp/changelog-with-version.md
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.RELEASE_TOKEN }}
          branch: prepare-release-${{ steps.bump.outputs.version }}
          title: Prepare release ${{ steps.bump.outputs.version }}
          base: main
          commit-message: "chore: bump version to ${{ steps.bump.outputs.version }}"
          body: ${{ steps.changelog.outputs.body }}
          committer: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          author: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          labels: release
          assignees: Peperehobbits01, Skudar
          reviewers: Peperehobbits01, Skudar

name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: "Manual version bump type (optional - auto-detected if empty)"
        required: false
        default: ""
        type: choice
        options:
          - ""
          - major
          - minor
          - patch

permissions:
  contents: write
  pull-requests: write

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Prepare release
        id: prepare
        uses: ./.github/actions/prepare-release
        env:
          MANUAL_BUMP: ${{ github.event.inputs.bump_type }}

      - name: Check if release PR already exists
        if: steps.prepare.outputs.skip != 'true'
        id: check-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW_VERSION: ${{ steps.prepare.outputs.new_version }}
        run: |
          EXISTING=$(gh pr list --head prepare-release-v"$NEW_VERSION" --json number --jq '.[0].number')
          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING already exists"
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "PR does not exist"
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create pull request
        if: steps.prepare.outputs.skip != 'true' && steps.check-pr.outputs.exists != 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: "prepare-release-v${{ steps.prepare.outputs.new_version }}"
          title: "Prepare release ${{ steps.prepare.outputs.new_version }}"
          body-path: /tmp/release-body.md
          body: "## What\x27s Changed\n\nThis release was auto-generated by the [Prepare Release workflow](https://github.com/${GITHUB_REPOSITORY}/blob/main/.github/workflows/prepare-release.yml)\n\n"
          base: ${{ github.event.repository.default_branch }}
          labels: release
